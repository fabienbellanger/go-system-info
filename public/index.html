<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Informations système</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/styles.css" />
    </head>

    <body>
        <div class="container">
            <header>
                <div class="title-block">
                    <h1><span class="logo">🖥️</span> Informations système</h1>
                </div>
                <div class="status" id="status" title="Connexion…">
                    <span class="dot" id="status-dot"></span>
                </div>
            </header>

            <div class="grid">
                <!-- CPU -->
                <div class="card">
                    <div class="card-title"><span class="icon">⚙️</span> Processeur</div>
                    <div class="gauge-wrap">
                        <div class="gauge">
                            <svg viewBox="0 0 150 150">
                                <title>Jauge d'utilisation du processeur</title>
                                <circle class="track" cx="75" cy="75" r="60" />
                                <circle class="progress" id="cpu-arc" cx="75" cy="75" r="60" />
                            </svg>
                            <div class="gauge-center">
                                <div class="gauge-value"><span id="cpu-value">—</span><span class="pct">%</span></div>
                                <div class="gauge-label">CPU</div>
                            </div>
                        </div>
                    </div>
                    <div class="detail" id="cpu-detail">—</div>
                </div>

                <!-- RAM -->
                <div class="card">
                    <div class="card-title"><span class="icon">🧠</span> Mémoire vive</div>
                    <div class="gauge-wrap">
                        <div class="gauge">
                            <svg viewBox="0 0 150 150">
                                <title>Jauge d'utilisation de la mémoire vive</title>
                                <circle class="track" cx="75" cy="75" r="60" />
                                <circle class="progress" id="mem-arc" cx="75" cy="75" r="60" />
                            </svg>
                            <div class="gauge-center">
                                <div class="gauge-value"><span id="mem-value">—</span><span class="pct">%</span></div>
                                <div class="gauge-label">RAM</div>
                            </div>
                        </div>
                    </div>
                    <div class="detail" id="mem-detail">—</div>
                </div>

                <!-- Disque -->
                <div class="card">
                    <div class="card-title"><span class="icon">🗄️</span> Disque</div>
                    <div class="gauge-wrap">
                        <div class="gauge">
                            <svg viewBox="0 0 150 150">
                                <title>Jauge d'utilisation du disque</title>
                                <circle class="track" cx="75" cy="75" r="60" />
                                <circle class="progress" id="disk-arc" cx="75" cy="75" r="60" />
                            </svg>
                            <div class="gauge-center">
                                <div class="gauge-value"><span id="disk-value">—</span><span class="pct">%</span></div>
                                <div class="gauge-label">Disque</div>
                            </div>
                        </div>
                    </div>
                    <div class="detail" id="disk-detail">—</div>
                </div>

                <!-- Hôte -->
                <div class="card host-card">
                    <div class="card-title"><span class="icon">🏷️</span> Hôte</div>
                    <ul class="info-list" id="host-list">
                        <li><span class="key">Chargement…</span></li>
                    </ul>
                </div>
            </div>

            <footer>
                Actualisation automatique toutes les <span id="refresh-label">3 s</span> · API <code>/api/system</code>
            </footer>
        </div>

        <script src="/app.js" defer></script>
    </body>
</html>
